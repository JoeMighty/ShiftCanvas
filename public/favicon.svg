<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark rounded square background -->
  <rect width="32" height="32" rx="7" fill="#111111"/>
  <!-- Calendar top dots (date pins) -->
  <rect x="10" y="4" width="2" height="4" rx="1" fill="white" opacity="0.8"/>
  <rect x="20" y="4" width="2" height="4" rx="1" fill="white" opacity="0.8"/>
  <!-- Calendar header bar -->
  <rect x="5" y="8" width="22" height="4" rx="1.5" fill="white" opacity="0.15"/>
  <!-- Row 1 shift blocks -->
  <rect x="5" y="15" width="9" height="3" rx="1" fill="#60a5fa"/>
  <rect x="16" y="15" width="11" height="3" rx="1" fill="white" opacity="0.2"/>
  <!-- Row 2 shift blocks -->
  <rect x="5" y="20" width="5" height="3" rx="1" fill="#fbbf24"/>
  <rect x="12" y="20" width="9" height="3" rx="1" fill="#60a5fa"/>
  <!-- Row 3 shift blocks -->
  <rect x="5" y="25" width="13" height="3" rx="1" fill="white" opacity="0.2"/>
  <rect x="20" y="25" width="7" height="3" rx="1" fill="#f87171"/>
</svg>
